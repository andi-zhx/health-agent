<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>医疗客户与健康档案管理</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; font-size: 14px; color: #333; background: #f5f5f5; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 200px; background: #2c3e50; color: #ecf0f1; padding: 16px 0; flex-shrink: 0; }
    .sidebar h1 { font-size: 16px; margin: 0 16px 20px; padding-bottom: 12px; border-bottom: 1px solid #34495e; }
    .sidebar a { display: block; padding: 10px 16px; color: #bdc3c7; text-decoration: none; border-left: 3px solid transparent; }
    .sidebar a:hover { background: #34495e; color: #fff; }
    .sidebar a.active { background: #34495e; color: #fff; border-left-color: #3498db; }
    .main { flex: 1; padding: 24px; overflow: auto; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 20px; margin-bottom: 20px; }
    .card h2 { margin: 0 0 16px; font-size: 18px; font-weight: 600; }
    .form-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; align-items: center; }
    .form-row label { min-width: 90px; }
    input, select, textarea { padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #3498db; }
    .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #3498db; color: #fff; }
    .btn-primary:hover { background: #2980b9; }
    .btn-secondary { background: #95a5a6; color: #fff; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-small { padding: 4px 10px; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; }
    tr:hover { background: #f8f9fa; }
    .stats { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
    .stat-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); min-width: 140px; }
    .stat-box .num { font-size: 24px; font-weight: 700; color: #2c3e50; }
    .stat-box .label { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
    .hide { display: none !important; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .search-bar input[type="text"] { width: 220px; }
    .search-bar select { width: 140px; }
    .result-section { margin-top: 20px; }
    .result-section h3 { font-size: 15px; margin: 12px 0 8px; color: #2c3e50; }
    .msg { padding: 10px 12px; border-radius: 4px; margin-bottom: 12px; }
    .msg.ok { background: #d4edda; color: #155724; }
    .msg.err { background: #f8d7da; color: #721c24; }
    .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: #fff; border-radius: 8px; max-width: 520px; width: 100%; max-height: 90vh; overflow: auto; padding: 24px; }
    .modal h3 { margin: 0 0 16px; }
    .modal-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    textarea { min-height: 60px; resize: vertical; width: 100%; }
    .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .mini-table { width: 100%; font-size: 13px; }
    .mini-table th, .mini-table td { padding: 8px 10px; }
    .trend-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .trend-bar .date { width: 90px; color: #666; font-size: 12px; }
    .trend-bar .bar { flex: 1; height: 12px; background: #ecf0f1; border-radius: 99px; overflow: hidden; }
    .trend-bar .bar > span { display: block; height: 100%; background: #3498db; }
    .trend-bar .value { width: 26px; text-align: right; color: #2c3e50; font-weight: 600; }
  </style>
</head>
<body>
  <div class="app">
    <nav class="sidebar">
      <h1>医疗档案管理</h1>
      <a href="#" data-page="home" class="active">首页</a>
      <a href="#" data-page="customers">客户档案</a>
      <a href="#" data-page="health">健康档案</a>
      <a href="#" data-page="appointments">预约记录</a>
      <a href="#" data-page="checkins">来访签到</a>
      <a href="#" data-page="usage">仪器使用</a>
      <a href="#" data-page="surveys">满意度</a>
      <a href="#" data-page="export">数据导出</a>
      <a href="#" data-page="search">综合查询</a>
    </nav>
    <main class="main">
      <div id="page-home" class="page">
        <div class="card">
          <h2>核心概览</h2>
          <div class="stats" id="stats"></div>
        </div>
        <div class="analytics-grid">
          <div class="card">
            <h2>最近 7 天预约趋势</h2>
            <div id="appointment-trend"></div>
          </div>
          <div class="card">
            <h2>预约状态分布</h2>
            <table class="mini-table"><thead><tr><th>状态</th><th>数量</th></tr></thead><tbody id="appointment-status"></tbody></table>
          </div>
          <div class="card">
            <h2>设备使用统计（Top10）</h2>
            <table class="mini-table"><thead><tr><th>设备</th><th>使用次数</th><th>总时长(分钟)</th></tr></thead><tbody id="equipment-usage-top"></tbody></table>
          </div>
          <div class="card">
            <h2>客户满意度与活跃度</h2>
            <table class="mini-table"><tbody id="satisfaction-summary"></tbody></table>
          </div>
        </div>
      </div>
      <div id="page-customers" class="page hide">
        <div class="card">
          <h2>客户档案</h2>
          <div class="search-bar">
            <input type="text" id="customer-search" placeholder="姓名 / 身份证 / 电话">
            <button class="btn btn-primary" id="btn-customer-search">搜索</button>
            <button class="btn btn-primary" id="btn-customer-add">新增客户</button>
          </div>
          <div id="customer-msg"></div>
          <table>
            <thead><tr><th>姓名</th><th>身份证</th><th>电话</th><th>操作</th></tr></thead>
            <tbody id="customer-list"></tbody>
          </table>
        </div>
      </div>
      <div id="page-health" class="page hide">
        <div class="card">
          <h2>健康档案</h2>
          <div class="form-row">
            <label>客户</label>
            <select id="health-customer"></select>
            <label>记录日期</label>
            <input type="date" id="health-date">
            <label>身高(cm)</label>
            <input type="number" id="health-height" placeholder="可选" style="width:80px">
            <label>体重(kg)</label>
            <input type="number" id="health-weight" placeholder="可选" style="width:80px">
            <label>血压</label>
            <input type="text" id="health-bp" placeholder="如 120/80" style="width:100px">
          </div>
          <div class="form-row">
            <label>症状</label>
            <input type="text" id="health-symptoms" placeholder="可选" style="flex:1;max-width:300px">
            <label>诊断</label>
            <input type="text" id="health-diagnosis" placeholder="可选" style="flex:1;max-width:300px">
          </div>
          <div class="form-row">
            <label>备注</label>
            <textarea id="health-notes" placeholder="可选" style="flex:1;max-width:400px"></textarea>
          </div>
          <div class="form-row">
            <button class="btn btn-primary" id="btn-health-save">保存记录</button>
          </div>
          <div id="health-msg"></div>
          <h3>历史记录</h3>
          <table><thead><tr><th>客户</th><th>日期</th><th>身高</th><th>体重</th><th>血压</th><th>症状/诊断</th></tr></thead><tbody id="health-list"></tbody></table>
        </div>
      </div>
      <div id="page-appointments" class="page hide">
        <div class="card">
          <h2>预约记录</h2>
          <div class="form-row">
            <label>客户</label>
            <select id="apt-customer"></select>
            <label>设备</label>
            <select id="apt-equipment"></select>
            <label>日期</label>
            <input type="date" id="apt-date">
            <label>开始</label>
            <input type="time" id="apt-start">
            <label>结束</label>
            <input type="time" id="apt-end">
            <label>备注</label>
            <input type="text" id="apt-notes" placeholder="可选">
          </div>
          <div class="form-row">
            <button class="btn btn-primary" id="btn-apt-check">检查可预约余量</button>
            <button class="btn btn-primary" id="btn-apt-save">保存预约</button>
          </div>
          <div id="apt-availability" style="color:#2c3e50;margin-bottom:8px"></div>
          <div id="apt-msg"></div>
          <table><thead><tr><th>客户</th><th>设备</th><th>日期</th><th>时间</th><th>状态</th><th>操作</th></tr></thead><tbody id="apt-list"></tbody></table>
        </div>
      </div>
      <div id="page-checkins" class="page hide">
        <div class="card">
          <h2>来访签到</h2>
          <div class="form-row">
            <label>客户</label>
            <select id="checkin-customer"></select>
            <label>签到时间</label>
            <input type="datetime-local" id="checkin-time" step="60">
            <label>来访目的</label>
            <input type="text" id="checkin-purpose" placeholder="可选">
            <label>备注</label>
            <input type="text" id="checkin-notes" placeholder="可选">
          </div>
          <div class="form-row">
            <button class="btn btn-primary" id="btn-checkin-save">签到</button>
          </div>
          <div id="checkin-msg"></div>
          <table><thead><tr><th>客户</th><th>签到时间</th><th>目的</th><th>备注</th></tr></thead><tbody id="checkin-list"></tbody></table>
        </div>
      </div>
      <div id="page-usage" class="page hide">
        <div class="card">
          <h2>仪器使用记录</h2>
          <div class="form-row">
            <label>客户</label>
            <select id="usage-customer"></select>
            <label>设备</label>
            <select id="usage-equipment"></select>
            <label>使用日期</label>
            <input type="date" id="usage-date">
            <label>时长(分钟)</label>
            <input type="number" id="usage-duration" style="width:80px">
            <label>操作员</label>
            <input type="text" id="usage-operator" placeholder="可选">
          </div>
          <div class="form-row">
            <label>参数/备注</label>
            <input type="text" id="usage-params" placeholder="可选" style="flex:1">
          </div>
          <div class="form-row">
            <button class="btn btn-primary" id="btn-usage-save">保存</button>
          </div>
          <div id="usage-msg"></div>
          <table><thead><tr><th>客户</th><th>设备</th><th>日期</th><th>时长</th><th>操作员</th></tr></thead><tbody id="usage-list"></tbody></table>
        </div>
      </div>
      <div id="page-surveys" class="page hide">
        <div class="card">
          <h2>满意度调查</h2>
          <div class="form-row">
            <label>客户</label>
            <select id="survey-customer"></select>
            <label>服务</label>
            <input type="number" id="survey-service" min="1" max="5" value="5" style="width:50px">
            <label>设备</label>
            <input type="number" id="survey-equipment" min="1" max="5" value="5" style="width:50px">
            <label>环境</label>
            <input type="number" id="survey-env" min="1" max="5" value="5" style="width:50px">
            <label>人员</label>
            <input type="number" id="survey-staff" min="1" max="5" value="5" style="width:50px">
            <label>综合</label>
            <input type="number" id="survey-overall" min="1" max="5" value="5" style="width:50px">
          </div>
          <div class="form-row">
            <label>反馈/建议</label>
            <textarea id="survey-feedback" placeholder="可选" style="flex:1;max-width:400px"></textarea>
          </div>
          <div class="form-row">
            <button class="btn btn-primary" id="btn-survey-save">提交</button>
          </div>
          <div id="survey-msg"></div>
        </div>
      </div>
      <div id="page-export" class="page hide">
        <div class="card">
          <h2>数据导出</h2>
          <p style="color:#666; margin-bottom:16px">导出为 Excel 文件并下载。</p>
          <div class="form-row">
            <button class="btn btn-primary" id="btn-export-customers">导出客户</button>
            <button class="btn btn-primary" id="btn-export-appointments">导出预约</button>
            <button class="btn btn-primary" id="btn-export-usage">导出使用记录</button>
          </div>
          <div id="export-msg"></div>
        </div>
      </div>
      <div id="page-search" class="page hide">
        <div class="card">
          <h2>综合查询</h2>
          <div class="search-bar">
            <input type="text" id="search-q" placeholder="输入关键词：姓名、电话、身份证、症状等">
            <select id="search-type">
              <option value="all">全部</option>
              <option value="customers">客户信息</option>
              <option value="health">健康档案</option>
              <option value="appointments">预约记录</option>
              <option value="checkins">来访签到</option>
              <option value="usage">仪器使用</option>
              <option value="surveys">满意度</option>
            </select>
            <button class="btn btn-primary" id="btn-search">查询</button>
          </div>
          <div id="search-result"></div>
        </div>
      </div>
    </main>
  </div>
  <div id="modal-customer" class="modal-mask hide">
    <div class="modal">
      <h3 id="modal-customer-title">新增客户</h3>
      <input type="hidden" id="modal-customer-id">
      <div class="form-row"><label>姓名</label><input type="text" id="mc-name" required></div>
      <div class="form-row"><label>身份证</label><input type="text" id="mc-id_card" required></div>
      <div class="form-row"><label>电话</label><input type="text" id="mc-phone" required></div>
      <div class="form-row"><label>邮箱</label><input type="text" id="mc-email"></div>
      <div class="form-row"><label>地址</label><input type="text" id="mc-address"></div>
      <div class="form-row"><label>性别</label><select id="mc-gender"><option value="">-</option><option value="男">男</option><option value="女">女</option></select></div>
      <div class="form-row"><label>出生日期</label><input type="date" id="mc-birth_date"></div>
      <div class="form-row"><label>病史</label><textarea id="mc-medical_history"></textarea></div>
      <div class="form-row"><label>过敏史</label><textarea id="mc-allergies"></textarea></div>
      <div class="form-row"><label>饮食习惯</label><textarea id="mc-diet_habits" placeholder="如：低盐、清淡、忌辛辣"></textarea></div>
      <div class="form-row"><label>基础疾病</label><textarea id="mc-chronic_diseases" placeholder="如：高血压、糖尿病"></textarea></div>
      <div class="form-row"><label>健康状况</label><textarea id="mc-health_status" placeholder="近期状态、风险提示"></textarea></div>
      <div class="form-row"><label>理疗禁忌</label><textarea id="mc-therapy_contraindications" placeholder="不适宜项目与注意事项"></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btn-modal-cancel">取消</button>
        <button class="btn btn-primary" id="btn-modal-save">保存</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
